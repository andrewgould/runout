<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="Helvetica, Arial, sans-serif">
  <rect width="1280" height="800" fill="#1b1c20"/>

  <!-- nav rail -->
  <rect x="0" y="0" width="84" height="800" fill="#101114"/>
  <circle cx="42" cy="64" r="18" fill="none" stroke="#4a4b53" stroke-width="2"/>
  <circle cx="42" cy="140" r="22" fill="#e8a33d"/>
  <text x="42" y="146" font-size="11" fill="#1b1c20" text-anchor="middle" font-weight="bold">EDIT</text>
  <circle cx="42" cy="210" r="18" fill="none" stroke="#4a4b53" stroke-width="2"/>
  <circle cx="42" cy="280" r="18" fill="none" stroke="#4a4b53" stroke-width="2"/>

  <text x="120" y="52" font-size="22" fill="#e9eaed" font-weight="bold">Split Into Tracks — Side A</text>

  <!-- toolbar -->
  <rect x="120" y="76" width="1080" height="44" rx="6" fill="#232429" stroke="#37383f"/>
  <text x="136" y="103" font-size="13" fill="#c7c8cd">Zoom</text>
  <rect x="184" y="86" width="120" height="24" rx="12" fill="#26272d" stroke="#37383f"/>
  <circle cx="270" cy="98" r="8" fill="#e8a33d"/>

  <rect x="330" y="86" width="170" height="24" rx="4" fill="#26272d" stroke="#37383f"/>
  <circle cx="344" cy="98" r="6" fill="#e8a33d"/>
  <text x="358" y="102" font-size="12" fill="#c7c8cd">Snap to Zero-Crossing</text>

  <rect x="900" y="84" width="150" height="28" rx="5" fill="#37383f"/>
  <text x="975" y="103" font-size="12" fill="#e9eaed" text-anchor="middle">Auto-Detect Tracks</text>

  <rect x="1060" y="84" width="120" height="28" rx="5" fill="#e8a33d"/>
  <text x="1120" y="103" font-size="12" fill="#1b1c20" text-anchor="middle" font-weight="bold">+ Add Marker</text>

  <!-- waveform canvas -->
  <rect x="120" y="140" width="1080" height="380" fill="#151519" stroke="#37383f"/>

  <!-- alternating track region tints -->
  <rect x="120" y="140" width="210" height="380" fill="#e8a33d" opacity="0.06"/>
  <rect x="330" y="140" width="260" height="380" fill="#ffffff" opacity="0.02"/>
  <rect x="590" y="140" width="180" height="380" fill="#e8a33d" opacity="0.06"/>
  <rect x="770" y="140" width="240" height="380" fill="#ffffff" opacity="0.02"/>
  <rect x="1010" y="140" width="190" height="380" fill="#e8a33d" opacity="0.06"/>

  <!-- waveform polyline -->
  <polyline points="130,330 150,300 170,350 190,280 210,360 230,310 250,290 270,340 290,300 310,370 330,320 350,280 370,350 390,300 410,330 430,290 450,360 470,310 490,340 510,290 530,300 550,350 570,320 590,290 610,340 630,300 650,360 670,310 690,330 710,290 730,350 750,300 770,320 790,290 810,360 830,310 850,340 870,300 890,330 910,290 930,350 950,310 970,300 990,340 1010,290 1030,360 1050,310 1070,330 1090,290 1110,340 1130,300 1150,320 1170,290 1190,350"
    fill="none" stroke="#e8a33d" stroke-width="2"/>

  <!-- markers -->
  <g stroke="#e9eaed" stroke-width="2">
    <line x1="330" y1="140" x2="330" y2="520"/>
    <line x1="590" y1="140" x2="590" y2="520"/>
    <line x1="770" y1="140" x2="770" y2="520"/>
    <line x1="1010" y1="140" x2="1010" y2="520"/>
  </g>
  <g fill="#e8a33d">
    <polygon points="330,140 342,140 330,156"/>
    <polygon points="590,140 602,140 590,156"/>
    <polygon points="770,140 782,140 770,156"/>
    <polygon points="1010,140 1022,140 1010,156"/>
  </g>

  <!-- playhead -->
  <line x1="480" y1="140" x2="480" y2="520" stroke="#ffffff" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,3"/>

  <!-- track list sidebar -->
  <rect x="1010" y="140" width="0" height="0"/>
  <text x="120" y="545" font-size="12" fill="#9a9ba3">Tracks</text>
  <g font-size="12" fill="#c7c8cd">
    <rect x="120" y="555" width="1080" height="30" fill="#232429" stroke="#37383f"/>
    <text x="132" y="575">1</text>
    <text x="160" y="575">Track 1</text>
    <text x="1160" y="575" text-anchor="end">3:41</text>

    <rect x="120" y="585" width="1080" height="30" fill="#1e1f24" stroke="#37383f"/>
    <text x="132" y="605">2</text>
    <text x="160" y="605">Track 2</text>
    <text x="1160" y="605" text-anchor="end">4:12</text>
  </g>

  <!-- transport scrubber -->
  <rect x="120" y="650" width="1080" height="8" rx="4" fill="#37383f"/>
  <rect x="120" y="650" width="420" height="8" rx="4" fill="#e8a33d"/>
  <circle cx="540" cy="654" r="8" fill="#e9eaed"/>
  <text x="120" y="690" font-size="13" fill="#9a9ba3">08:12 / 19:04</text>
  <polygon points="1150,674 1150,706 1176,690" fill="#e8a33d"/>
</svg>
