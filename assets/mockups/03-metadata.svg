<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="Helvetica, Arial, sans-serif">
  <rect width="1280" height="800" fill="#1b1c20"/>

  <!-- nav rail -->
  <rect x="0" y="0" width="84" height="800" fill="#101114"/>
  <circle cx="42" cy="64" r="18" fill="none" stroke="#4a4b53" stroke-width="2"/>
  <circle cx="42" cy="140" r="18" fill="none" stroke="#4a4b53" stroke-width="2"/>
  <circle cx="42" cy="210" r="22" fill="#e8a33d"/>
  <text x="42" y="216" font-size="10" fill="#1b1c20" text-anchor="middle" font-weight="bold">TAG</text>
  <circle cx="42" cy="280" r="18" fill="none" stroke="#4a4b53" stroke-width="2"/>

  <text x="120" y="52" font-size="22" fill="#e9eaed" font-weight="bold">Track Details — Abbey Road</text>

  <!-- track list -->
  <rect x="120" y="80" width="280" height="600" rx="6" fill="#232429" stroke="#37383f"/>
  <text x="136" y="106" font-size="12" fill="#9a9ba3">TRACKS</text>
  <g font-size="13" fill="#c7c8cd">
    <rect x="120" y="118" width="280" height="34" fill="#e8a33d" opacity="0.18"/>
    <text x="136" y="140">1  Come Together</text>
    <rect x="120" y="152" width="280" height="34" fill="transparent"/>
    <text x="136" y="174">2  Something</text>
    <text x="136" y="208">3  Maxwell's Silver Hammer</text>
    <text x="136" y="242">4  Oh! Darling</text>
    <text x="136" y="276">5  Octopus's Garden</text>
  </g>
  <line x1="130" y1="152" x2="390" y2="152" stroke="#37383f"/>
  <line x1="130" y1="186" x2="390" y2="186" stroke="#37383f"/>
  <line x1="130" y1="220" x2="390" y2="220" stroke="#37383f"/>
  <line x1="130" y1="254" x2="390" y2="254" stroke="#37383f"/>

  <!-- form panel -->
  <rect x="430" y="80" width="730" height="600" rx="6" fill="#232429" stroke="#37383f"/>

  <text x="452" y="112" font-size="13" fill="#9a9ba3" font-weight="bold">ALBUM</text>
  <rect x="452" y="124" width="380" height="10" fill="transparent"/>

  <!-- cover art dropzone -->
  <rect x="990" y="112" width="130" height="130" rx="6" fill="#1b1c20" stroke="#4a4b53" stroke-dasharray="5,4"/>
  <text x="1055" y="182" font-size="11" fill="#6f7078" text-anchor="middle">Drop cover art</text>

  <g font-size="12" fill="#9a9ba3">
    <text x="452" y="150">Album Title</text>
    <rect x="452" y="158" width="500" height="30" rx="4" fill="#1b1c20" stroke="#37383f"/>
    <text x="464" y="178" fill="#e9eaed" font-size="13">Abbey Road</text>

    <text x="452" y="206">Album Artist</text>
    <rect x="452" y="214" width="240" height="30" rx="4" fill="#1b1c20" stroke="#37383f"/>
    <text x="464" y="234" fill="#e9eaed" font-size="13">The Beatles</text>

    <text x="708" y="206">Year</text>
    <rect x="708" y="214" width="100" height="30" rx="4" fill="#1b1c20" stroke="#37383f"/>
    <text x="720" y="234" fill="#e9eaed" font-size="13">1969</text>

    <text x="824" y="206">Genre</text>
    <rect x="824" y="214" width="128" height="30" rx="4" fill="#1b1c20" stroke="#37383f"/>
    <text x="836" y="234" fill="#e9eaed" font-size="13">Rock</text>
  </g>

  <rect x="452" y="262" width="230" height="26" rx="5" fill="#37383f"/>
  <text x="567" y="280" font-size="11" fill="#e9eaed" text-anchor="middle">Apply Album Info to All Tracks</text>
  <rect x="694" y="262" width="200" height="26" rx="5" fill="#26272d" stroke="#4a4b53"/>
  <text x="794" y="280" font-size="11" fill="#c7c8cd" text-anchor="middle">🔍 Look Up on MusicBrainz</text>

  <line x1="452" y1="306" x2="1120" y2="306" stroke="#37383f"/>

  <text x="452" y="332" font-size="13" fill="#9a9ba3" font-weight="bold">TRACK 1</text>
  <g font-size="12" fill="#9a9ba3">
    <text x="452" y="368">Title</text>
    <rect x="452" y="376" width="500" height="30" rx="4" fill="#1b1c20" stroke="#37383f"/>
    <text x="464" y="396" fill="#e9eaed" font-size="13">Come Together</text>

    <text x="452" y="424">Artist</text>
    <rect x="452" y="432" width="240" height="30" rx="4" fill="#1b1c20" stroke="#37383f"/>
    <text x="464" y="452" fill="#e9eaed" font-size="13">The Beatles</text>

    <text x="708" y="424">Track #</text>
    <rect x="708" y="432" width="100" height="30" rx="4" fill="#1b1c20" stroke="#37383f"/>
    <text x="720" y="452" fill="#e9eaed" font-size="13">1</text>

    <text x="824" y="424">Disc #</text>
    <rect x="824" y="432" width="128" height="30" rx="4" fill="#1b1c20" stroke="#37383f"/>
    <text x="836" y="452" fill="#e9eaed" font-size="13">1</text>
  </g>

  <line x1="452" y1="490" x2="1120" y2="490" stroke="#37383f"/>
  <text x="452" y="516" font-size="11" fill="#6f7078">Output filename preview</text>
  <text x="452" y="540" font-size="13" fill="#e8a33d" font-family="monospace">01 - Come Together.flac</text>
</svg>
