<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#33353c"/>
      <stop offset="100%" stop-color="#17181c"/>
    </radialGradient>
    <radialGradient id="disc" cx="42%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#2a2b30"/>
      <stop offset="70%" stop-color="#141417"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </radialGradient>
    <radialGradient id="label" cx="40%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#f4b45a"/>
      <stop offset="100%" stop-color="#d9822a"/>
    </radialGradient>
    <linearGradient id="tonearm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e7e9ee"/>
      <stop offset="100%" stop-color="#aeb1b9"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- vinyl disc -->
  <circle cx="470" cy="540" r="410" fill="url(#disc)"/>

  <!-- groove rings -->
  <g fill="none" stroke="#3a3b42" stroke-width="3">
    <circle cx="470" cy="540" r="360" opacity="0.55"/>
    <circle cx="470" cy="540" r="320" opacity="0.5"/>
    <circle cx="470" cy="540" r="280" opacity="0.45"/>
    <circle cx="470" cy="540" r="240" opacity="0.4"/>
  </g>
  <circle cx="470" cy="540" r="410" fill="none" stroke="#000000" stroke-width="6" opacity="0.4"/>

  <!-- label -->
  <circle cx="470" cy="540" r="150" fill="url(#label)"/>
  <circle cx="470" cy="540" r="150" fill="none" stroke="#8a5a1d" stroke-width="4" opacity="0.5"/>

  <!-- radial waveform ticks on label -->
  <g stroke="#8a5a1d" stroke-width="7" stroke-linecap="round" opacity="0.55">
    <line x1="470" y1="410" x2="470" y2="392"/>
    <line x1="561" y1="437" x2="573" y2="422"/>
    <line x1="600" y1="540" x2="620" y2="540"/>
    <line x1="561" y1="643" x2="573" y2="658"/>
    <line x1="470" y1="670" x2="470" y2="688"/>
    <line x1="379" y1="643" x2="367" y2="658"/>
    <line x1="340" y1="540" x2="320" y2="540"/>
    <line x1="379" y1="437" x2="367" y2="422"/>
  </g>

  <!-- spindle hole -->
  <circle cx="470" cy="540" r="16" fill="#17181c"/>

  <!-- tonearm -->
  <g>
    <rect x="700" y="180" width="34" height="330" rx="17" transform="rotate(28 717 180)" fill="url(#tonearm)"/>
    <circle cx="742" cy="176" r="46" fill="url(#tonearm)"/>
    <circle cx="742" cy="176" r="46" fill="none" stroke="#82858d" stroke-width="4"/>
    <!-- headshell + cartridge at record end -->
    <g transform="rotate(28 470 540)">
      <rect x="452" y="520" width="66" height="30" rx="6" fill="#c8cbd2"/>
      <rect x="460" y="546" width="18" height="14" rx="3" fill="#e8a33d"/>
    </g>
  </g>

  <!-- subtle vignette edge -->
  <rect width="1024" height="1024" fill="none" stroke="#000000" stroke-opacity="0.25" stroke-width="2"/>
</svg>
